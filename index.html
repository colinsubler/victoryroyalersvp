<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Victory Royale Farm RSVP</title>
	<style>
		:root {
			--bg-start: #f5f7ff;
			--bg-end: #d8efff;
			--card: #ffffff;
			--text: #11213f;
			--muted: #4d5a73;
			--accent: #1e88e5;
			--accent-hover: #156fc1;
			--banner-start: #0d47a1;
			--banner-end: #1976d2;
			--shadow: 0 10px 26px rgba(17, 33, 63, 0.14);
			--radius: 14px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
			min-height: 100vh;
			display: flex;
			justify-content: center;
			padding: 16px;
		}

		.page {
			width: min(860px, 100%);
			background: var(--card);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			overflow: hidden;
		}

		.banner {
			padding: 22px 20px;
			background: linear-gradient(135deg, var(--banner-start), var(--banner-end));
			color: #ffffff;
			text-align: center;
		}

		.banner h1 {
			margin: 0;
			font-size: clamp(1.35rem, 4vw, 2rem);
			letter-spacing: 0.3px;
		}

		.content {
			padding: 20px;
		}

		.event-info {
			margin: 0 0 20px;
			padding: 0;
			list-style: none;
			display: grid;
			gap: 10px;
		}

		.event-info li {
			background: #f7fbff;
			border: 1px solid #dce9f7;
			border-radius: 10px;
			padding: 10px 12px;
		}

		.label {
			font-weight: 700;
			margin-right: 6px;
		}

		.attendee-section h2 {
			font-size: 1.1rem;
			margin: 0 0 12px;
		}

		.attendee-list {
			margin: 0;
			padding: 0;
			list-style: none;
			display: grid;
			gap: 10px;
		}

		.attendee-item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			background: #ffffff;
			border: 1px solid #dce9f7;
			border-radius: 10px;
			padding: 10px 12px;
		}

		.rsvp-btn {
			border: none;
			border-radius: 999px;
			background: var(--accent);
			color: #ffffff;
			font-weight: 700;
			cursor: pointer;
			padding: 8px 14px;
			transition: background-color 0.2s ease, transform 0.15s ease;
			white-space: nowrap;
		}

		.rsvp-btn:hover,
		.rsvp-btn:focus-visible {
			background: var(--accent-hover);
			outline: none;
		}

		.rsvp-btn:active {
			transform: translateY(1px);
		}

		@media (max-width: 520px) {
			body {
				padding: 10px;
			}

			.content {
				padding: 14px;
			}

			.attendee-item {
				flex-wrap: wrap;
			}

			.rsvp-btn {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<main class="page">
		<header class="banner">
			<h1>Victory Royale Farm RSVP</h1>
		</header>

		<section class="content">
			<ul class="event-info" aria-label="Event information">
				<li><span class="label">What:</span>Fortnite Battle Royale Zero Build</li>
				<li><span class="label">When:</span>4/1/2026 9:15pm</li>
				<li><span class="label">Why:</span>Celebration of end of work and celebration of life</li>
			</ul>

			<section class="attendee-section" aria-label="Attendees">
				<h2>Guest List</h2>
				<ul class="attendee-list">
					<li class="attendee-item">
						<span>Alison Smith</span>
						<button class="rsvp-btn" type="button">RSVP</button>
					</li>
					<li class="attendee-item">
						<span>Emmerson Smith</span>
						<button class="rsvp-btn" type="button">RSVP</button>
					</li>
					<li class="attendee-item">
						<span>Dana Ritchie</span>
						<button class="rsvp-btn" type="button">RSVP</button>
					</li>
					<li class="attendee-item">
						<span>Colin Subler</span>
						<button class="rsvp-btn" type="button">RSVP</button>
					</li>
				</ul>
			</section>
		</section>
	</main>

	<script>
		document.querySelectorAll('.rsvp-btn').forEach((button) => {
			button.addEventListener('click', () => {
				window.alert('Your response has been recorded');
			});
		});
	</script>
</body>
</html>
